<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ScrapK Ventures</title>
    <!-- Tailwind CSS for UI controls -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex items-center justify-center p-4">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Login Container -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden transform transition duration-300">
        <!-- Top Banner -->
        <div class="bg-navy-900 bg-[#0f172a] text-white p-8 text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-tr from-brand-600/20 to-indigo-500/20 pointer-events-none"></div>
            <div class="relative z-10 flex flex-col items-center">
                <div class="h-16 w-16 bg-white rounded-2xl flex items-center justify-center shadow-md p-1.5 mb-3">
                    <img src="/frontend/logo.png" alt="Logo" class="h-full w-full object-contain">
                </div>
                <h2 class="text-xl font-bold tracking-tight text-white">SCRAPK VENTURES</h2>
                <p class="text-xs text-slate-300 mt-1">Admin Portal Secure Login</p>
            </div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="p-6 sm:p-8 space-y-5">
            <div>
                <label for="login-username" class="block text-xs font-bold uppercase tracking-wider text-slate-505 text-slate-500 mb-1.5">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="login-username" required placeholder="Enter username" 
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition text-sm">
                </div>
            </div>

            <div>
                <label for="login-password" class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="login-password" required placeholder="Enter password" 
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent focus:bg-white transition text-sm">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" 
                        class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-shield-halved"></i> Authenticate
                </button>
            </div>
        </form>
    </div>

    <script>
        // API host resolution
        const apiHost = window.location.origin.includes('5500') || (window.location.origin.includes('localhost') && !window.location.origin.includes('8000'))
            ? 'http://127.0.0.1:8000'
            : '';

        // Toast notifications logic
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center space-x-3 p-4 rounded-xl shadow-lg border text-sm max-w-sm pointer-events-auto bg-white transition duration-300`;
            
            let icon = '';
            if (type === 'success') {
                toast.classList.add('border-emerald-100', 'text-slate-800');
                icon = '<i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>';
            } else {
                toast.classList.add('border-rose-100', 'text-slate-800');
                icon = '<i class="fa-solid fa-circle-exclamation text-rose-500 text-lg"></i>';
            }

            toast.innerHTML = `
                ${icon}
                <span class="font-semibold text-slate-700">${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'transform', '-translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('login-username').value;
            const passwordInput = document.getElementById('login-password').value;
            
            try {
                const response = await fetch(`${apiHost}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('scrapk_session_token', data.token);
                    showToast("Authentication successful!");
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    const err = await response.json();
                    showToast(err.detail || "Invalid credentials", "error");
                }
            } catch (e) {
                console.error(e);
                showToast("Connection to Auth API failed.", "error");
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            // If already authenticated, redirect back to home
            const token = localStorage.getItem('scrapk_session_token');
            if (token) {
                window.location.href = '/';
                return;
            }

            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', handleLogin);
            }
        });
    </script>
</body>
</html>
