<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - ScrapK Ventures</title>
    <!-- Tailwind CSS for UI controls -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: #ffffff !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            #invoice-container {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 flex flex-col items-center py-8 px-4">

    <!-- Top Action Bar (no-print) -->
    <div class="no-print w-full max-w-3xl flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <div class="flex items-center space-x-2">
            <img src="/frontend/logo.png" alt="Logo" class="h-8 object-contain">
            <span class="font-extrabold text-slate-700 text-sm tracking-tight">SCRAPK VENTURES</span>
        </div>
        <div class="flex space-x-3">
            <button onclick="window.close()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-xs font-bold transition">
                <i class="fa-solid fa-xmark mr-1"></i> Close
            </button>
            <button onclick="window.print()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-xs font-bold flex items-center gap-1.5 transition">
                <i class="fa-solid fa-print"></i> Print / Save PDF
            </button>
        </div>
    </div>

    <!-- Error state -->
    <div id="error-box" class="hidden w-full max-w-md bg-white border border-rose-100 p-6 rounded-xl shadow-md text-center">
        <i class="fa-solid fa-circle-exclamation text-rose-500 text-4xl mb-4"></i>
        <h3 class="font-bold text-slate-800 text-lg mb-2">Invoice Not Found</h3>
        <p class="text-slate-500 text-sm mb-4">The requested invoice details could not be loaded. Please check the link.</p>
    </div>

    <!-- Loading state -->
    <div id="loading-box" class="w-full max-w-md bg-white p-6 rounded-xl shadow-md text-center">
        <i class="fa-solid fa-circle-notch fa-spin text-brand-500 text-4xl mb-4 text-indigo-600"></i>
        <p class="text-slate-600 text-sm font-semibold">Loading invoice details...</p>
    </div>

    <!-- Main Invoice Render Container -->
    <div id="invoice-container" class="hidden w-full max-w-3xl bg-white p-8 rounded-xl shadow-md border border-slate-200">
        <div id="invoice-content"></div>
    </div>

    <script>
        // API host resolution
        const apiHost = window.location.origin.includes('5500') || (window.location.origin.includes('localhost') && !window.location.origin.includes('8000'))
            ? 'http://127.0.0.1:8000'
            : '';

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function formatDateString(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr;
            return date.toLocaleDateString('en-IN', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        }

        function escapeHTML(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function loadInvoice() {
            const id = getQueryParam('id');
            if (!id) {
                showError();
                return;
            }

            try {
                const response = await fetch(`${apiHost}/api/invoices/${id}`);
                if (response.ok) {
                    const inv = await response.json();
                    renderInvoice(inv);
                } else {
                    showError();
                }
            } catch (e) {
                console.error(e);
                showError();
            }
        }

        function showError() {
            document.getElementById('loading-box').classList.add('hidden');
            document.getElementById('error-box').classList.remove('hidden');
        }

        function renderInvoice(invoice) {
            document.getElementById('loading-box').classList.add('hidden');
            const container = document.getElementById('invoice-container');
            container.classList.remove('hidden');

            let itemRows = '';
            invoice.items.forEach((item, index) => {
                const rowBg = index % 2 === 0 ? '#ffffff' : '#f8fafc';
                itemRows += `
                    <tr style="border-bottom: 1px solid #e2e8f0; background-color: ${rowBg};">
                        <td style="padding: 7px 8px; text-align: center; font-size: 10px; color: #64748b;">${index + 1}</td>
                        <td style="padding: 7px 8px; font-size: 10px; font-weight: 600; color: #0f172a;">${escapeHTML(item.scrap_type)}</td>
                        <td style="padding: 7px 8px; text-align: right; font-size: 10px; color: #334155;">${item.weight.toFixed(2)} kg</td>
                        <td style="padding: 7px 8px; text-align: right; font-size: 10px; color: #334155;">₹${item.rate.toFixed(2)}</td>
                        <td style="padding: 7px 8px; text-align: right; font-size: 10px; font-weight: 700; color: #0f172a;">₹${item.amount.toFixed(2)}</td>
                    </tr>
                `;
            });

            const showGSTBreakdown = invoice.apply_gst;
            const gstBreakdownHtml = showGSTBreakdown ? `
                <tr>
                    <td style="padding: 5px 10px; color: #64748b; text-align: left;">GST (${invoice.gst_percent}%${invoice.tax_inclusive ? ' Incl.' : ''}):</td>
                    <td style="padding: 5px 10px; color: #0f172a; font-weight: 700; text-align: right;">₹${invoice.gst_amount.toFixed(2)}</td>
                </tr>
            ` : '';

            const billTypeTitle = invoice.bill_type === "GST_INVOICE" ? "TAX INVOICE" : "BILL OF SUPPLY";

            const template = `
                <div style="color-scheme: light; width: 100%; max-width: 750px; margin: 0 auto; background: #ffffff; color: #1e293b;">
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 18px;">
                        <tr>
                            <td style="width: 60%; vertical-align: top;">
                                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                                    <img src="/frontend/logo.png" alt="ScrapK Logo" style="height: 44px; object-fit: contain;">
                                    <div style="line-height: 1.15;">
                                        <h2 style="font-size: 18px; font-weight: 800; color: #0f172a; margin: 0;">SCRAPK VENTURES PVT. LTD.</h2>
                                        <span style="font-size: 9px; font-weight: 700; color: #10b981; letter-spacing: 0.5px; text-transform: uppercase;">Circular Material Logistics</span>
                                    </div>
                                </div>
                                <p style="font-size: 8.5px; color: #64748b; line-height: 1.4; margin: 0; max-width: 320px;">
                                    <strong>Regd Office:</strong> 43/99 Taj Nagari Phase 2, Opp. Parth Sathi Hospital, Tajganj, Agra - 282001<br>
                                    <strong>Support:</strong> scrapkventuresprivateltd@gmail.com | +91 9671596013
                                </p>
                            </td>
                            <td style="width: 40%; text-align: right; vertical-align: top;">
                                <h1 style="font-size: 22px; font-weight: 900; color: #0f172a; margin: 0 0 5px 0; letter-spacing: -0.5px;">${billTypeTitle}</h1>
                                <table style="float: right; margin-top: 5px; font-size: 10px; color: #475569; border-collapse: collapse;">
                                    <tr><td style="font-weight: 600; padding: 2px 6px; text-align: right; color: #64748b; font-size: 9px;">Invoice No:</td><td style="font-weight: 700; padding: 2px 6px; color: #0f172a;">${invoice.invoice_number}</td></tr>
                                    <tr><td style="font-weight: 600; padding: 2px 6px; text-align: right; color: #64748b; font-size: 9px;">Date:</td><td style="font-weight: 600; padding: 2px 6px; color: #0f172a;">${formatDateString(invoice.invoice_date)}</td></tr>
                                    <tr><td style="font-weight: 600; padding: 2px 6px; text-align: right; color: #64748b; font-size: 9px;">Status:</td><td style="padding: 2px 6px;"><span style="background-color: #dcfce7; color: #16a34a; padding: 1.5px 6px; border-radius: 4px; font-weight: 800; font-size: 8.5px;">PAID</span></td></tr>
                                </table>
                            </td>
                        </tr>
                    </table>
                    <div style="border-top: 2px solid #0f172a; margin-bottom: 15px;"></div>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 18px;">
                        <tr>
                            <td style="width: 50%; vertical-align: top; background-color: #f8fafc; padding: 12px 16px; border-left: 4px solid #10b981;">
                                <h4 style="font-size: 8.5px; font-weight: 800; color: #64748b; text-transform: uppercase; margin: 0 0 5px 0;">Billed To:</h4>
                                <p style="font-size: 13px; font-weight: 700; color: #0f172a; margin: 0 0 4px 0; text-transform: uppercase;">${escapeHTML(invoice.customer_name)}</p>
                                ${invoice.customer_phone ? `<p style="font-size: 10px; color: #475569; margin: 0 0 2px 0;"><strong>Phone:</strong> ${escapeHTML(invoice.customer_phone)}</p>` : ''}
                                ${invoice.customer_address ? `<p style="font-size: 10px; color: #475569; margin: 0;"><strong>Address:</strong> ${escapeHTML(invoice.customer_address)}</p>` : ''}
                            </td>
                            <td style="width: 50%; vertical-align: top; padding: 8px 8px 8px 24px;">
                                <p style="font-size: 10px; color: #475569; margin: 0; line-height: 1.45;"><strong>Vendor Pickup Ledger</strong><br>Material weight validated under calibrated digital scale on site.</p>
                            </td>
                        </tr>
                    </table>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 18px; border: 1px solid #e2e8f0;">
                        <thead><tr style="background-color: #0f172a; color: #ffffff; font-size: 9px;">
                            <th style="padding: 8px; text-align: center; width: 8%;">Sr.</th>
                            <th style="padding: 8px; text-align: left;">Material Details</th>
                            <th style="padding: 8px; text-align: right; width: 18%;">Net Weight</th>
                            <th style="padding: 8px; text-align: right; width: 18%;">Rate/Kg</th>
                            <th style="padding: 8px; text-align: right; width: 20%;">Total Value</th>
                        </tr></thead>
                        <tbody>${itemRows}</tbody>
                    </table>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                        <tr>
                            <td style="width: 55%; vertical-align: top; padding-right: 20px;">
                                <div style="border: 1px solid #e2e8f0; padding: 12px; font-size: 8.5px; color: #64748b; line-height: 1.45; background-color: #fafafa;">
                                    <strong style="color: #475569; display: block; margin-bottom: 4px; font-size: 9px; text-transform: uppercase;">Ledger Terms:</strong>
                                    1. Weight verified by on-site digital indicators.<br>2. HSN codes subject to recycling policies.<br>3. Non-GST bills serve as bills of supply.<br>4. Secure system-registered ledger receipt.
                                </div>
                            </td>
                            <td style="width: 45%; vertical-align: top;">
                                <table style="width: 100%; border-collapse: collapse; font-size: 10.5px; border: 1px solid #e2e8f0; background-color: #f8fafc;">
                                    <tr><td style="padding: 6px 10px; color: #64748b;">Subtotal:</td><td style="padding: 6px 10px; color: #0f172a; font-weight: 700; text-align: right;">₹${invoice.subtotal.toFixed(2)}</td></tr>
                                    <tr><td style="padding: 4px 10px; color: #64748b;">Taxable Value:</td><td style="padding: 4px 10px; color: #0f172a; font-weight: 700; text-align: right;">₹${invoice.taxable_value.toFixed(2)}</td></tr>
                                    ${gstBreakdownHtml}
                                    <tr style="border-bottom: 1px solid #cbd5e1;"><td style="padding: 4px 10px; color: #64748b;">Labour & Transport:</td><td style="padding: 4px 10px; color: #0f172a; font-weight: 700; text-align: right;">₹${invoice.external_fare.toFixed(2)}</td></tr>
                                    <tr style="background-color: #0f172a; color: #ffffff;"><td style="padding: 8px 10px; font-weight: 800; font-size: 11px;">GRAND TOTAL:</td><td style="padding: 8px 10px; color: #10b981; font-weight: 900; text-align: right; font-size: 14px;">₹${invoice.grand_total.toFixed(2)}</td></tr>
                                </table>
                            </td>
                        </tr>
                    </table>
                    <div style="margin-top: 30px; text-align: center; font-size: 9px; color: #94a3b8; border-top: 1px dashed #e2e8f0; padding-top: 12px; text-transform: uppercase;">
                        Thank you for doing business with ScrapK Ventures Pvt. Ltd.
                    </div>
                </div>
            `;

            document.getElementById('invoice-content').innerHTML = template;
            
            // Auto-trigger print view after DOM fully paints
            setTimeout(() => {
                window.print();
            }, 500);
        }

        window.addEventListener('DOMContentLoaded', loadInvoice);
    </script>
</body>
</html>
